  .page-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px, 7vw, 58px); letter-spacing: 4px; color: var(--white); text-shadow: 3px 3px 0 var(--navy); line-height: 1; }
  .page-title span { color: var(--red-light); }
  .questions-card { max-width: 680px; width: 100%; background: var(--glass); border: 2px solid var(--glass-border); border-radius: 10px; padding: 2rem 2rem 2.5rem; }
  .questions-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; color: var(--white); margin-bottom: 0.4rem; }

  .q-number { font-family: 'Bebas Neue', sans-serif; color: var(--red-light); font-size: 18px; margin-right: 6px; }
  .q-hint { font-size: 13px; color: rgba(255,255,255,0.65); margin-bottom: 0.9rem; line-height: 1.6; }
  .grade-row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }

  .grade-btn:hover { border-color: var(--red-light); background: rgba(200,35,29,0.2); }

  .submit-wrap { max-width: 680px; width: 100%; display: flex; justify-content: center; }
  .submit-btn { background: var(--red); color: var(--white); border: none; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 4px; padding: 16px 60px; border-radius: 4px; cursor: pointer; transition: background 0.2s, transform 0.15s; width: 100%; max-width: 340px; }

  .nav-pills { display: flex; gap: 0.6rem; margin-top: 1rem; flex-wrap: wrap; justify-content: center; }

  .nav-pill:hover { background: var(--white); }
  .nav-pill.active { background: var(--red); color: var(--white); }
  footer { background: var(--navy); color: var(--sky-light); text-align: center; padding: 1.2rem; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; border-top: 3px solid var(--red); }

function applyLang(lang) {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (I18N[lang] && I18N[lang][key] !== undefined) el.innerHTML = I18N[lang][key];
  });
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-ro').classList.toggle('active', lang === 'ro');
}

function setLang(lang) {
  localStorage.setItem('tbmca_lang', lang);
  applyLang(lang);
}

document.querySelectorAll('.grade-row').forEach(row => {
  row.querySelectorAll('.grade-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      row.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });
});

function calcScore() {
  const lang = localStorage.getItem('tbmca_lang') || 'en';
  const rows = document.querySelectorAll('.grade-row');
  let total = 0, answered = 0;
  rows.forEach(row => {
    const sel = row.querySelector('.grade-btn.selected');
    if (sel) {
      let val = parseInt(sel.dataset.val);
      if (row.dataset.invert === 'true') val = 6 - val;
      total += val; answered++;
    }
  });
  if (answered < rows.length) { alert(I18N[lang].alert_msg); return; }
  const avg = total / rows.length;
  localStorage.setItem('score_product', avg);
  const panel = document.getElementById('resultPanel');
  const icon = document.getElementById('resultIcon');
  const hl = document.getElementById('resultHeadline');
  const body = document.getElementById('resultBody');
  panel.classList.remove('misaligned','improving','validated','show');
  if (avg <= 2) {
    panel.classList.add('misaligned','show'); icon.textContent = '⚠️';
    hl.textContent = I18N[lang].r1_hl; body.textContent = I18N[lang].r1_body;
  } else if (avg <= 4) {
    panel.classList.add('improving','show'); icon.textContent = '📈';
    hl.textContent = I18N[lang].r2_hl; body.textContent = I18N[lang].r2_body;
  } else {
    panel.classList.add('validated','show'); icon.textContent = '🎯';
    hl.textContent = I18N[lang].r3_hl; body.textContent = I18N[lang].r3_body;
  }
  panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

(function() {
  const saved = localStorage.getItem('score_product');
  if (saved) {
    const avg = parseFloat(saved);
    const closest = Math.round(avg);
    document.querySelectorAll('.grade-row').forEach(row => {
      row.querySelectorAll('.grade-btn').forEach(b => {
        if (parseInt(b.dataset.val) === closest) b.classList.add('selected');
      });
    });
  }
})();

const savedLang = localStorage.getItem('tbmca_lang') || 'en';
applyLang(savedLang);
</script>
</body>
</html>
