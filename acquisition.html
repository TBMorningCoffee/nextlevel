function applyLang(lang) {
  document.querySelectorAll('[data-i18n]').forEach(el => { const key = el.dataset.i18n; if (I18N[lang] && I18N[lang][key] !== undefined) el.innerHTML = I18N[lang][key]; });
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-ro').classList.toggle('active', lang === 'ro');
}
function setLang(lang) { localStorage.setItem('tbmca_lang', lang); applyLang(lang); }

document.querySelectorAll('.grade-row').forEach(row => {
  row.querySelectorAll('.grade-btn').forEach(btn => {
    btn.addEventListener('click', () => { row.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); });
  });
});

  const rows = document.querySelectorAll('.grade-row');
  let total = 0, answered = 0;
  rows.forEach(row => { const sel = row.querySelector('.grade-btn.selected'); if (sel) { total += parseInt(sel.dataset.val); answered++; } });
  if (answered < rows.length) { alert(I18N[lang].alert_msg); return; }
  const avg = total / rows.length;
  localStorage.setItem('score_acquisition', avg);
  const panel = document.getElementById('resultPanel'); const icon = document.getElementById('resultIcon'); const hl = document.getElementById('resultHeadline'); const body = document.getElementById('resultBody');
  panel.classList.remove('fragile','building','robust','show');
  if (avg <= 2) { panel.classList.add('fragile','show'); icon.textContent='🧱'; hl.textContent=I18N[lang].r1_hl; body.textContent=I18N[lang].r1_body; }
  else if (avg <= 4) { panel.classList.add('building','show'); icon.textContent='⚙️'; hl.textContent=I18N[lang].r2_hl; body.textContent=I18N[lang].r2_body; }
  else { panel.classList.add('robust','show'); icon.textContent='🚀'; hl.textContent=I18N[lang].r3_hl; body.textContent=I18N[lang].r3_body; }
  panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

(function() {
  const saved = localStorage.getItem('score_acquisition');
  if (saved) { const closest = Math.round(parseFloat(saved)); document.querySelectorAll('.grade-row').forEach(row => { row.querySelectorAll('.grade-btn').forEach(b => { if (parseInt(b.dataset.val) === closest) b.classList.add('selected'); }); }); }
})();

const savedLang = localStorage.getItem('tbmca_lang') || 'en';
applyLang(savedLang);
</script>
</body>
